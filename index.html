<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Pass Explorer</title>
  <script src="theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <p class="eyebrow">Pass Explorer</p>
        <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">Dark mode</button>
      </div>
      <h1>Find The Right Pass For Any Amusement Park!</h1>
      <p class="hero-copy">
        Compare pass prices and find which amusement parks are included!
      </p>
    </header>
    <button id="toggleBtn" class="filter-toggle" aria-expanded="false" aria-label="Open filters">Filters</button>
    <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <div class="content-layout">
      <section class="results-panel">
        <h2 class="section-title">Available Season Passes</h2>
        <div id="passGrid" class="pass-grid" aria-live="polite"></div>
      </section>

      <section class="controls" id="controls" aria-label="Filter passes">
        <div class="filters-header">
          <h2 class="filters-title">Filters</h2>
          <button id="closeFiltersBtn" class="filters-close" type="button" aria-label="Close filters">Close</button>
        </div>
        <div class="control">
          <label for="companyFilterInput">Filter by Company</label>
          <div class="park-combobox">
            <input
              id="companyFilterInput"
              type="search"
              placeholder="Search companies"
              autocomplete="off"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="companyFilterList"
            >
            <ul id="companyFilterList" class="park-combobox-list" role="listbox" hidden></ul>
          </div>
        </div>
        <div class="control">
          <label for="parkFilterInput">Filter by Park Access</label>
          <div class="park-combobox">
            <input
              id="parkFilterInput"
              type="search"
              placeholder="Search parks"
              autocomplete="off"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="parkFilterList"
            >
            <ul id="parkFilterList" class="park-combobox-list" role="listbox" hidden></ul>
          </div>
        </div>
        <div class="control">
          <label for="countryFilterInput">Filter by Country</label>
          <div class="park-combobox">
            <input
              id="countryFilterInput"
              type="search"
              placeholder="Search countries"
              autocomplete="off"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="countryFilterList"
            >
            <ul id="countryFilterList" class="park-combobox-list" role="listbox" hidden></ul>
          </div>
        </div>
        <div class="control">
          <label for="stateFilterInput">Filter by State / Province</label>
          <div class="park-combobox">
            <input
              id="stateFilterInput"
              type="search"
              placeholder="Search states / provinces"
              autocomplete="off"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="stateFilterList"
            >
            <ul id="stateFilterList" class="park-combobox-list" role="listbox" hidden></ul>
          </div>
        </div>
        <div class="control">
          <label for="typeFilterInput">Filter by Pass Tiers</label>
          <div class="park-combobox">
            <input
              id="typeFilterInput"
              type="search"
              placeholder="Search tiers"
              autocomplete="off"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="typeFilterList"
            >
            <ul id="typeFilterList" class="park-combobox-list" role="listbox" hidden></ul>
          </div>
        </div>
        <div class="control">
          <label for="priceSort">Sort by Price</label>
          <select id="priceSort">
            <option value="none">Default</option>
            <option value="low-high">Lowest to Highest</option>
            <option value="high-low">Highest to Lowest</option>
          </select>
        </div>
        <p id="resultsMeta" class="results-meta"></p>
      </section>
    </div>
  </main>

  <template id="passCardTemplate">
    <article class="pass-card">
      <div class="card-top">
        <h3 class="pass-name"></h3>
        <p class="pass-price"></p>
      </div>
      <div>
        <p class="detail-label">Park Access</p>
        <ul class="park-list"></ul>
        <button type="button" class="park-toggle" hidden aria-expanded="false">More</button>
      </div>
      <p class="pass-disclaimer" hidden></p>
    </article>
  </template>

  <!-- Data -->
  <script src="companies.js"></script>
  <script src="parks.js"></script>
  <script src="pass-catalog.js"></script>
  <script src="pricing.js"></script>

  <!-- UI -->
  <script src="render.js"></script>
  <script src="filters.js"></script>
  <script src="main.js"></script>
</body>
</html>
