<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Pass Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function initTheme() {
      let stored = null;
      try {
        stored = localStorage.getItem("pe-theme");
      } catch (err) {
        stored = null;
      }

      let prefersDark = false;
      try {
        prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      } catch (err) {
        prefersDark = false;
      }

      const theme = stored || (prefersDark ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();

    // Fallback binding in case external scripts fail to load.
    window.addEventListener("DOMContentLoaded", function bindThemeToggleFallback() {
      const toggle = document.getElementById("themeToggle");
      if (!toggle) return;
      if (toggle.dataset.themeToggleBound === "true") return;
      toggle.dataset.themeToggleBound = "true";

      function getTheme() {
        return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
      }

      function applyTheme(theme) {
        const normalized = theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = normalized;
        toggle.setAttribute("aria-pressed", String(normalized === "dark"));
        toggle.textContent = normalized === "dark" ? "Light mode" : "Dark mode";

        try {
          localStorage.setItem("pe-theme", normalized);
        } catch (err) {
          // Ignore if storage is unavailable.
        }
      }

      applyTheme(getTheme());
      toggle.addEventListener("click", function onThemeToggleClick() {
        applyTheme(getTheme() === "dark" ? "light" : "dark");
      });
    });
  </script>
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <p class="eyebrow">Pass Explorer</p>
        <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">Dark mode</button>
      </div>
      <h1>Find The Right Pass For Any Amusement Park!</h1>
      <p class="hero-copy">
        Compare pass prices and find which amusement parks are included!
      </p>
    </header>
  <button id="toggleBtn" class="filter-toggle" aria-expanded="false" aria-label="Open filters">Filters</button>
  <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>
    <section class="controls" id="controls" aria-label="Filter passes">
      <div class="control">
        <label for="companyFilterInput">Filter by Company</label>
        <div class="park-combobox">
          <input
            id="companyFilterInput"
            type="search"
            placeholder="Search companies"
            autocomplete="off"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="companyFilterList"
          >
          <ul id="companyFilterList" class="park-combobox-list" role="listbox" hidden></ul>
        </div>
      </div>
      <div class="control">
        <label for="parkFilterInput">Filter by Park Access</label>
        <div class="park-combobox">
          <input
            id="parkFilterInput"
            type="search"
            placeholder="Search parks"
            autocomplete="off"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="parkFilterList"
          >
          <ul id="parkFilterList" class="park-combobox-list" role="listbox" hidden></ul>
        </div>
      </div>
      <div class="control">
        <label for="typeFilter">Filter by Pass Tiers</label>
        <select id="typeFilter">
          <option value="all">All Tiers</option>
        </select>
      </div>
      <div class="control">
        <label for="priceSort">Sort by Price</label>
        <select id="priceSort">
          <option value="none">Default</option>
          <option value="low-high">Lowest to Highest</option>
          <option value="high-low">Highest to Lowest</option>
        </select>
      </div>
      <p id="resultsMeta" class="results-meta"></p>
    </section>

    <section>
      <h2 class="section-title">Available Season Passes</h2>
      <div id="passGrid" class="pass-grid" aria-live="polite"></div>
    </section>
  </main>

  <template id="passCardTemplate">
    <article class="pass-card">
      <div class="card-top">
        <h3 class="pass-name"></h3>
        <p class="pass-price"></p>
      </div>
      <div>
        <p class="detail-label">Park Access</p>
        <ul class="park-list"></ul>
        <button type="button" class="park-toggle" hidden aria-expanded="false">More</button>
      </div>
      <p class="pass-disclaimer" hidden></p>
    </article>
  </template>

  <script src="companies.js"></script>
  <script src="parks.js"></script>
  <script src="pass-catalog.js"></script>
  <script src="pricing.js"></script>
  <script src="theme.js"></script>
  <script src="render.js"></script>
  <script src="filters.js"></script>
  <script src="main.js"></script>
  <script src="tgl-btn.js"></script>
</body>
</html>
